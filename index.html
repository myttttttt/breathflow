<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121219">
<title>BreathFlow</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121219;--card:#21212b;
  --text:rgba(255,255,255,.9);--text2:rgba(255,255,255,.5);
  --coral:#f28d73;--blue:#6699cc;--indigo:#7366bf;--sage:#8cbf8c;--tomato:#e8634a;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Rounded','Helvetica Neue',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* HOME */
#home{display:flex;flex-direction:column;height:100%;padding:env(safe-area-inset-top) 24px 0}
.top-bar{display:flex;justify-content:flex-end;gap:8px;padding:16px 0 0}
.top-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lang-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer}
/* Reminder FAB */
.reminder-fab{position:fixed;bottom:32px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .15s}
.reminder-fab:active{transform:scale(.9)}
.reminder-fab .badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--sage);color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.home-title{text-align:center;font-size:34px;font-weight:200;margin:8px 0 20px;letter-spacing:2px}
.cards{display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;padding-bottom:40px}
.section-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.card{display:flex;align-items:center;gap:16px;padding:16px;background:var(--card);border-radius:16px;cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px}
.card-body{flex:1}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-name{font-size:20px;font-weight:600}
.card-time{font-size:12px;color:var(--text2)}
.card-sub{font-size:13px;margin-top:3px}
.card-purpose{font-size:12px;color:var(--text2);margin-top:2px}

/* SESSION (breathing) */
#session{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:10}
#session.active{display:flex}
.sess-top{display:flex;justify-content:space-between;align-items:center;padding:60px 24px 0}
.sess-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.sess-right{display:flex;align-items:center;gap:8px}
.sess-counter{font-size:14px;font-family:monospace;color:var(--text)}
.sess-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.phase-label{font-size:30px;font-weight:300;margin-bottom:48px;transition:opacity .3s}
.breath-area{position:relative;width:340px;height:340px;display:flex;align-items:center;justify-content:center}
.breath-circle{width:220px;height:220px;border-radius:50%;position:absolute;transition:transform ease-in-out;will-change:transform}
.breath-glow{width:260px;height:260px;border-radius:50%;position:absolute;filter:blur(20px);opacity:.08;transition:transform ease-in-out;will-change:transform}
.timer-arc{position:absolute;width:270px;height:270px}
.timer-arc circle{fill:none;stroke-width:2;stroke-linecap:round;transition:stroke-dashoffset linear .05s}
.hypno-ring{position:absolute;border-radius:50%;border-style:dashed;opacity:0;transition:opacity .5s}
.hypno-ring.visible{opacity:1}
.ring1{width:330px;height:330px;border-width:1.2px;animation:spin1 50s linear infinite}
.ring2{width:290px;height:290px;border-width:1px;animation:spin2 38s linear infinite}
.ring3{width:250px;height:250px;border-width:.8px;animation:spin3 28s linear infinite}
.ring4{width:216px;height:216px;border-width:.7px;animation:spin4 21s linear infinite}
.ring5{width:184px;height:184px;border-width:.6px;animation:spin5 15s linear infinite}
@keyframes spin1{to{transform:rotate(360deg)}}
@keyframes spin2{to{transform:rotate(-360deg)}}
@keyframes spin3{to{transform:rotate(360deg)}}
@keyframes spin4{to{transform:rotate(-360deg)}}
@keyframes spin5{to{transform:rotate(360deg)}}
.sess-footer{text-align:center;padding-bottom:40px}
.instruction{font-size:16px;color:var(--text2);margin-bottom:4px;transition:opacity .3s}
.sleep-hint{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:16px}
.info-btn{background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:8px}

/* DONE */
#done{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:11}
#done.active{display:flex}
.done-icon{font-size:60px;margin-bottom:16px}
.done-title{font-size:28px;font-weight:300;margin-bottom:8px}
.done-sub{font-size:14px;color:var(--text2);margin-bottom:60px}
.done-btn{background:rgba(255,255,255,.1);border:none;color:var(--text);font-size:20px;font-weight:600;padding:16px 0;width:calc(100% - 80px);border-radius:14px;cursor:pointer}

/* INFO MODAL */
#info-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20;align-items:flex-end;justify-content:center}
#info-modal.active{display:flex}
.info-sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:24px 24px env(safe-area-inset-bottom)}
.info-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 20px}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.info-header span{font-size:28px}
.info-header h2{font-size:24px;font-weight:300;flex:1}
.info-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}
.info-section{margin-bottom:20px}
.info-section h3{font-size:15px;font-weight:600;margin-bottom:8px}
.info-section p{font-size:16px;line-height:1.6;color:rgba(255,255,255,.85)}
.info-warning{background:rgba(255,200,0,.08);padding:16px;border-radius:12px;margin-bottom:20px}
.info-warning h3{color:rgba(255,200,0,.8)}
.info-warning p{color:rgba(255,255,255,.8)}
.rhythm-tags{display:flex;gap:8px;flex-wrap:wrap}
.rhythm-tag{background:var(--card);padding:6px 10px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.7)}

/* REMINDER MODAL */
#reminder-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20;align-items:center;justify-content:center}
#reminder-modal.active{display:flex}
.reminder-sheet{background:var(--bg);border-radius:20px;width:calc(100% - 48px);max-width:360px;padding:24px}
.reminder-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center}
.reminder-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.reminder-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:12px}
.reminder-item input[type=time]{background:transparent;border:none;color:var(--text);font-size:18px;font-family:monospace;flex:1;outline:none}
.reminder-item input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1)}
.reminder-del{background:none;border:none;color:var(--coral);font-size:18px;cursor:pointer}
.reminder-add{width:100%;padding:12px;background:var(--card);border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:16px}
.reminder-save{width:100%;padding:14px;background:var(--sage);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:600;cursor:pointer}
.reminder-note{font-size:11px;color:var(--text2);text-align:center;margin-top:12px}

/* POMODORO */
#pomo{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;z-index:10}
#pomo.active{display:flex}
.pomo-top{display:flex;justify-content:space-between;align-items:center;padding:60px 24px 0}
.pomo-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-status{font-size:16px;color:var(--text2);margin-bottom:8px}
.pomo-ring{position:relative;width:260px;height:260px;margin-bottom:32px}
.pomo-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring circle.bg{fill:none;stroke:var(--card);stroke-width:6}
.pomo-ring circle.fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.pomo-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:200;font-family:monospace}
.pomo-dots{display:flex;gap:12px;margin-bottom:24px}
.pomo-dot{width:12px;height:12px;border-radius:50%;background:var(--card);transition:background .3s}
.pomo-dot.done{background:var(--tomato)}
.pomo-dot.active{background:var(--tomato);box-shadow:0 0 8px var(--tomato)}
.pomo-label{font-size:14px;color:var(--text2)}
.pomo-footer{text-align:center;padding-bottom:40px}
.pomo-pause{background:none;border:1px solid rgba(255,255,255,.2);color:var(--text);padding:10px 32px;border-radius:10px;font-size:15px;cursor:pointer}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="top-bar">
    <button class="lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <h1 class="home-title">呼吸法</h1>
  <div class="cards" id="cards"></div>
  <button class="reminder-fab" onclick="showReminder()" id="reminder-fab">&#x1F514;</button>
</div>

<!-- SESSION -->
<div id="session">
  <div class="sess-top">
    <button class="sess-btn" onclick="exitSession()">&#x2715;</button>
    <div class="sess-right">
      <button class="sess-btn" id="sound-btn" onclick="toggleSound()">&#x1F50A;</button>
      <span class="sess-counter" id="counter"></span>
    </div>
  </div>
  <div class="sess-body">
    <div class="phase-label" id="phase-label"></div>
    <div class="breath-area">
      <div class="hypno-ring ring1" id="hr1"></div>
      <div class="hypno-ring ring2" id="hr2"></div>
      <div class="hypno-ring ring3" id="hr3"></div>
      <div class="hypno-ring ring4" id="hr4"></div>
      <div class="hypno-ring ring5" id="hr5"></div>
      <div class="breath-glow" id="glow"></div>
      <div class="breath-circle" id="circle"></div>
      <svg class="timer-arc" viewBox="0 0 270 270">
        <circle id="arc" cx="135" cy="135" r="133" transform="rotate(-90 135 135)" stroke-dasharray="835.66" stroke-dashoffset="835.66"/>
      </svg>
    </div>
  </div>
  <div class="sess-footer">
    <div class="instruction" id="instruction"></div>
    <div class="sleep-hint" id="sleep-hint" style="display:none"></div>
    <button class="info-btn" id="info-btn" onclick="showInfo()"></button>
  </div>
</div>

<!-- POMODORO -->
<div id="pomo">
  <div class="pomo-top">
    <button class="sess-btn" onclick="exitPomo()">&#x2715;</button>
    <div class="sess-right">
      <button class="sess-btn" id="pomo-sound-btn" onclick="toggleSound()">&#x1F50A;</button>
    </div>
  </div>
  <div class="pomo-body">
    <div class="pomo-status" id="pomo-status"></div>
    <div class="pomo-ring">
      <svg viewBox="0 0 260 260">
        <circle class="bg" cx="130" cy="130" r="120"/>
        <circle class="fg" id="pomo-arc" cx="130" cy="130" r="120" stroke-dasharray="753.98" stroke-dashoffset="0"/>
      </svg>
      <div class="pomo-time" id="pomo-time">25:00</div>
    </div>
    <div class="pomo-dots" id="pomo-dots"></div>
    <div class="pomo-label" id="pomo-label"></div>
  </div>
  <div class="pomo-footer">
    <button class="pomo-pause" id="pomo-pause" onclick="togglePomoPause()"></button>
  </div>
</div>

<!-- DONE -->
<div id="done">
  <div class="done-icon">&#x2714;</div>
  <div class="done-title" id="done-title"></div>
  <div class="done-sub" id="done-sub"></div>
  <button class="done-btn" id="done-btn" onclick="closeDone()"></button>
</div>

<!-- INFO MODAL -->
<div id="info-modal" onclick="closeInfo(event)">
  <div class="info-sheet" id="info-sheet"></div>
</div>

<!-- REMINDER MODAL -->
<div id="reminder-modal" onclick="closeReminder(event)">
  <div class="reminder-sheet" id="reminder-sheet"></div>
</div>

<script>
// ===================== DATA =====================
const techniques = [
  {id:'4-7-8',icon:'\u{1F319}',nameEN:'4-7-8 Breathing',nameZH:'4-7-8 呼吸法',subEN:'Deep Sedation',subZH:'深度助眠',purposeEN:'Insomnia, racing thoughts',purposeZH:'失眠、思緒狂奔',time:'~76s',color:'var(--indigo)',colorRaw:'#7366bf',steps:[{p:'inhale',d:4},{p:'hold',d:7},{p:'exhale',d:8}],cycles:4,hypnotic:true,
    info:{descEN:'Inhale 4s, hold 7s, exhale 8s. A powerful natural sedative.',descZH:'吸氣 4 秒、憋氣 7 秒、吐氣 8 秒。強效天然鎮靜劑。',sciEN:'Developed by Dr. Andrew Weil. Shifts autonomic nervous system toward rest-and-digest.',sciZH:'由 Andrew Weil 醫師提出。將自律神經切換至休息模式。',srcEN:'Dr. Andrew Weil; Jerath et al., 2006',srcZH:'Andrew Weil 醫師；Jerath 等人，2006',warnEN:'Start with shorter holds (4-4-6) if 7s is hard. Do not drive.',warnZH:'初學者可從 4-4-6 開始。請勿開車時練習。'}},
  {id:'coherent',icon:'\u{1F30A}',nameEN:'Coherent Breathing',nameZH:'共振呼吸',subEN:'Daily Balance',subZH:'日常平衡',purposeEN:'Ongoing stress, commute',purposeZH:'持續性壓力、通勤放鬆',time:'~5 min',color:'var(--sage)',colorRaw:'#8cbf8c',steps:[{p:'inhale',d:5.5},{p:'exhale',d:5.5}],cycles:27,hypnotic:false,
    info:{descEN:'5.5s in, 5.5s out. ~5.5 breaths/min. Simplest daily maintenance.',descZH:'吸 5.5 秒、吐 5.5 秒。最簡單的日常保養法。',sciEN:'Maximizes HRV, synchronizes heart, BP, and brainwaves.',sciZH:'最大化心率變異度，讓心跳、血壓、腦波共振。',srcEN:'Lehrer & Gevirtz, 2014',srcZH:'Lehrer & Gevirtz，2014',warnEN:null,warnZH:null}},
  {id:'box',icon:'\u{25A2}',nameEN:'Box Breathing',nameZH:'箱式呼吸',subEN:'Focus & Calm',subZH:'冷靜專注',purposeEN:'High-pressure decisions',purposeZH:'高壓決策、需要專注時',time:'~80s',color:'var(--blue)',colorRaw:'#6699cc',steps:[{p:'inhale',d:4},{p:'hold',d:4},{p:'exhale',d:4},{p:'holdAfter',d:4}],cycles:5,hypnotic:false,
    info:{descEN:'4-4-4-4 square pattern. Used by Navy SEALs.',descZH:'4-4-4-4 正方形循環。海豹突擊隊訓練法。',sciEN:'Forces attentional control, reduces cortisol.',sciZH:'迫使注意力集中，降低皮質醇。',srcEN:'Navy SEALs; Ma et al., 2017',srcZH:'海豹突擊隊；Ma 等人，2017',warnEN:'Shorten holds if dizzy.',warnZH:'頭暈請縮短憋氣。'}},
  {id:'sigh',icon:'\u{1F4A8}',nameEN:'Physiological Sigh',nameZH:'生理性嘆息',subEN:'Emergency Calm',subZH:'緊急鎮靜',purposeEN:'Panic, anger, stage fright',purposeZH:'恐慌、暴怒、上台前',time:'~30s',color:'var(--coral)',colorRaw:'#f28d73',steps:[{p:'inhale',d:1.5},{p:'inhale2',d:1},{p:'exhale',d:6},{p:'rest',d:1.5}],cycles:3,hypnotic:false,
    info:{descEN:'Double inhale + long exhale. Fastest way to lower heart rate.',descZH:'雙重吸氣 + 長吐氣。最快降低心率的方法。',sciEN:'Stanford Huberman Lab. Reinflates lung alveoli.',sciZH:'史丹佛 Huberman Lab。重新撐開肺泡。',srcEN:'Balban et al., 2023',srcZH:'Balban 等人，2023',warnEN:null,warnZH:null}}
];
const phaseNames={inhale:{zh:'吸氣',en:'Inhale'},inhale2:{zh:'吸氣',en:'Inhale'},hold:{zh:'憋氣',en:'Hold'},holdAfter:{zh:'憋氣',en:'Hold'},exhale:{zh:'吐氣',en:'Exhale'},rest:{zh:'休息',en:'Rest'}};
const phaseInstr={inhale:{zh:'用鼻子慢慢吸氣',en:'Breathe in through your nose'},inhale2:{zh:'再吸一小口氣',en:'One more sip of air'},hold:{zh:'輕輕屏住呼吸',en:'Hold gently'},holdAfter:{zh:'輕輕屏住呼吸',en:'Hold gently'},exhale:{zh:'緩慢地吐氣',en:'Slowly release'},rest:{zh:'自然停頓',en:'Natural pause'}};
const scaleMap={inhale:1,inhale2:1.15,hold:1,exhale:.35,holdAfter:.35,rest:.4};

// ===================== STATE =====================
let zh=localStorage.getItem('lang')!=='en';
let cur=null,stepIdx=0,cycle=1,timer=null,arcRAF=null,phaseStart=0,phaseDur=0;
let soundOn=false,audioCtx=null,waterNode=null;
let homeSoundOn=false;
let pomoState=null,pomoTimer=null,pomoRAF=null,pomoPaused=false;
let pomoFrom='home'; // track where we came from
let reminders=JSON.parse(localStorage.getItem('reminders')||'[]');

// ===================== RENDER HOME =====================
function renderHome(){
  const c=document.getElementById('cards');
  c.innerHTML='';
  const frag=document.createDocumentFragment();
  // Breathing section label
  const bLabel=document.createElement('div');bLabel.className='section-label';bLabel.textContent=zh?'呼吸法':'Breathing';
  frag.appendChild(bLabel);
  // Breathing cards
  techniques.forEach(t=>{
    const d=document.createElement('div');d.className='card';d.onclick=()=>startSession(t);
    d.innerHTML=`<div class="card-icon" style="color:${t.color}">${t.icon}</div>
      <div class="card-body">
        <div class="card-row"><span class="card-name">${zh?t.nameZH:t.nameEN}</span><span class="card-time">${t.time}</span></div>
        <div class="card-sub" style="color:${t.color};opacity:.8">${zh?t.subZH:t.subEN}</div>
        <div class="card-purpose">${zh?t.purposeZH:t.purposeEN}</div>
      </div>`;
    frag.appendChild(d);
  });
  // Tools section label
  const tLabel=document.createElement('div');tLabel.className='section-label';tLabel.style.marginTop='12px';tLabel.textContent=zh?'工具':'Tools';
  frag.appendChild(tLabel);
  // Pomodoro card
  const pd=document.createElement('div');pd.className='card';pd.onclick=startPomo;
  pd.innerHTML=`<div class="card-icon" style="color:var(--tomato)">\u{1F345}</div>
    <div class="card-body">
      <div class="card-row"><span class="card-name">${zh?'蕃茄呼吸':'Pomo Breathe'}</span><span class="card-time">~2h</span></div>
      <div class="card-sub" style="color:var(--tomato);opacity:.8">${zh?'專注工作 + 定時呼吸':'Focus + Timed Breathing'}</div>
      <div class="card-purpose">${zh?'工作 25 分鐘 → 共振呼吸 5 分鐘':'Work 25 min → Coherent breathing 5 min'}</div>
    </div>`;
  frag.appendChild(pd);
  c.appendChild(frag);
  document.querySelector('.home-title').textContent=zh?'呼吸法':'Breathe';
  document.querySelector('.lang-btn').textContent=zh?'EN':'中';
  // Update reminder FAB badge
  const fab=document.getElementById('reminder-fab');
  if(reminders.length>0) fab.innerHTML=`\u{1F514}<span class="badge">${reminders.length}</span>`;
  else fab.innerHTML='\u{1F514}';
}
function toggleLang(){zh=!zh;localStorage.setItem('lang',zh?'zh':'en');renderHome()}

// ===================== AUDIO =====================
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function startWater(){
  if(!audioCtx||waterNode)return;
  const node=audioCtx.createScriptProcessor(4096,0,1);
  let lp1=0,lp2=0;
  node.onaudioprocess=e=>{const out=e.outputBuffer.getChannelData(0);for(let i=0;i<out.length;i++){const n=Math.random()*2-1;lp1+=.06*(n-lp1);lp2+=.06*(lp1-lp2);const t=audioCtx.currentTime+i/audioCtx.sampleRate;const f1=(1+Math.sin(2*Math.PI*.12*t))*.5;const f2=(1+Math.sin(2*Math.PI*.07*t+2.1))*.5;out[i]=lp2*.12*(.6+.4*f1*f2)}};
  const gain=audioCtx.createGain();gain.gain.value=.8;node.connect(gain);gain.connect(audioCtx.destination);waterNode={node,gain};
}
function playPhaseSound(phase){
  if(!soundOn||!audioCtx)return;
  const freqs={inhale:[261.6,392,523.2],inhale2:[329.6,392],hold:[196,293.6],holdAfter:[196,293.6],exhale:[130.8,196,329.6],rest:[]};
  const vols={inhale:.07,inhale2:.05,hold:.025,holdAfter:.025,exhale:.06,rest:0};
  const durs={inhale:1.2,inhale2:.6,hold:1.2,holdAfter:1.2,exhale:1.2,rest:0};
  const f=freqs[phase]||[];if(!f.length)return;
  const dur=durs[phase],vol=vols[phase],t=audioCtx.currentTime;
  f.forEach((freq,idx)=>{const osc=audioCtx.createOscillator();const g=audioCtx.createGain();osc.frequency.value=freq*(1+idx*.001);osc.type='sine';const amp=vol*(idx===0?1:idx===1?.6:.3);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(amp,t+.03);g.gain.exponentialRampToValueAtTime(.0001,t+dur);osc.connect(g);g.connect(audioCtx.destination);osc.start(t);osc.stop(t+dur)});
}
function playAlertSound(){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  [523.2,659.2,784].forEach((f,i)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,t+i*.15);g.gain.linearRampToValueAtTime(.08,t+i*.15+.05);g.gain.exponentialRampToValueAtTime(.0001,t+i*.15+.6);o.connect(g);g.connect(audioCtx.destination);o.start(t+i*.15);o.stop(t+i*.15+.6)});
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-btn').innerHTML=soundOn?'\u{1F50A}':'\u{1F507}';
  document.getElementById('pomo-sound-btn').innerHTML=soundOn?'\u{1F50A}':'\u{1F507}';
  if(waterNode)waterNode.gain.gain.value=soundOn?.8:0;
}

// ===================== BREATHING SESSION =====================
function startSession(t,from){
  initAudio();soundOn=true;
  cur=t;stepIdx=0;cycle=1;pomoFrom=from||'home';
  document.getElementById('session').classList.add('active');document.getElementById('home').style.display='none';document.getElementById('pomo').classList.remove('active');
  const circle=document.getElementById('circle'),glow=document.getElementById('glow');
  circle.style.background=`radial-gradient(circle,${t.colorRaw}99,${t.colorRaw}26)`;glow.style.background=t.colorRaw;
  document.getElementById('arc').style.stroke=t.colorRaw+'59';
  document.querySelectorAll('.hypno-ring').forEach(r=>{r.style.borderColor=t.colorRaw;r.classList.toggle('visible',t.hypnotic)});
  const hint=document.getElementById('sleep-hint');
  if(t.id==='4-7-8'){hint.style.display='block';hint.textContent=zh?'看著圖像變化會更容易有睡意':'Watching the visual changes helps you feel sleepy'}else hint.style.display='none';
  document.getElementById('info-btn').textContent=zh?'(i) 了解更多':'(i) Learn More';
  runStep();
}
function runStep(){
  if(!cur)return;const step=cur.steps[stepIdx],p=step.p,d=step.d;phaseDur=d;phaseStart=performance.now();
  const l=zh?'zh':'en';document.getElementById('phase-label').textContent=phaseNames[p][l];
  document.getElementById('instruction').textContent=phaseInstr[p][l];document.getElementById('counter').textContent=`${cycle} / ${cur.cycles}`;
  const sc=scaleMap[p],circle=document.getElementById('circle'),glow=document.getElementById('glow');
  const ease=p==='inhale'||p==='inhale2'?'ease-in':p==='exhale'?'ease-out':'ease-in-out';
  const dur=p==='hold'||p==='holdAfter'?.3:d;
  circle.style.transition=`transform ${dur}s ${ease}`;glow.style.transition=`transform ${dur}s ${ease}`;
  circle.style.transform=`scale(${sc})`;glow.style.transform=`scale(${sc})`;
  playPhaseSound(p);if(navigator.vibrate)navigator.vibrate(p==='exhale'?40:p==='hold'||p==='holdAfter'?15:25);
  startArc();clearTimeout(timer);
  timer=setTimeout(()=>{stepIdx++;if(stepIdx>=cur.steps.length){stepIdx=0;cycle++;if(cycle>cur.cycles){finishSession();return}}runStep()},d*1000);
}
function startArc(){const arc=document.getElementById('arc'),total=835.66;function tick(){const p=Math.min((performance.now()-phaseStart)/1000/phaseDur,1);arc.style.strokeDashoffset=total*(1-p);if(p<1)arcRAF=requestAnimationFrame(tick)}cancelAnimationFrame(arcRAF);tick()}
function finishSession(){
  clearTimeout(timer);cancelAnimationFrame(arcRAF);document.getElementById('session').classList.remove('active');
  if(pomoFrom==='pomo'){cur=null;advancePomo();return}
  const d=document.getElementById('done');d.classList.add('active');d.style.color=cur.colorRaw;
  document.getElementById('done-title').textContent=zh?'完成了':'Well Done';
  document.getElementById('done-sub').textContent=zh?cur.nameZH:cur.nameEN;
  document.getElementById('done-btn').textContent=zh?'結束':'Done';document.getElementById('done-btn').style.background=cur.colorRaw+'33';
}
function closeDone(){document.getElementById('done').classList.remove('active');document.getElementById('home').style.display='flex';cur=null}
function exitSession(){clearTimeout(timer);cancelAnimationFrame(arcRAF);document.getElementById('session').classList.remove('active');
  if(pomoFrom==='pomo'){document.getElementById('pomo').classList.add('active');cur=null;return}
  document.getElementById('home').style.display='flex';cur=null}

// ===================== POMODORO =====================
const POMO_WORK=25*60,POMO_SHORT=5*60,POMO_LONG=15*60,POMO_TOTAL=4;
function startPomo(){
  initAudio();pomoState={phase:'work',round:1,remaining:POMO_WORK,total:POMO_WORK,startedAt:Date.now(),pauseOffset:0};pomoPaused=false;
  document.getElementById('home').style.display='none';document.getElementById('pomo').classList.add('active');
  document.getElementById('pomo-arc').style.stroke='var(--tomato)';
  renderPomoUI();tickPomo();
}
function renderPomoUI(){
  const s=pomoState;if(!s)return;
  const statusMap={work:{zh:'專注工作中',en:'Focus Time'},shortBreak:{zh:'呼吸休息',en:'Breathing Break'},longBreak:{zh:'長休息',en:'Long Break'}};
  document.getElementById('pomo-status').textContent=statusMap[s.phase][zh?'zh':'en'];
  // dots
  let dots='';for(let i=1;i<=POMO_TOTAL;i++){const cls=i<s.round?'done':i===s.round?'active':'';dots+=`<div class="pomo-dot ${cls}"></div>`}
  document.getElementById('pomo-dots').innerHTML=dots;
  document.getElementById('pomo-label').textContent=zh?`第 ${s.round} / ${POMO_TOTAL} 個蕃茄`:`Pomodoro ${s.round} / ${POMO_TOTAL}`;
  document.getElementById('pomo-pause').textContent=pomoPaused?(zh?'繼續':'Resume'):(zh?'暫停':'Pause');
  // color
  document.getElementById('pomo-arc').style.stroke=s.phase==='work'?'var(--tomato)':'var(--sage)';
}
function tickPomo(){
  cancelAnimationFrame(pomoRAF);
  function frame(){
    if(!pomoState)return;
    if(!pomoPaused){
      const elapsed=(Date.now()-pomoState.startedAt-pomoState.pauseOffset)/1000;
      pomoState.remaining=Math.max(0,pomoState.total-elapsed);
    }
    // update display
    const r=pomoState.remaining,m=Math.floor(r/60),s=Math.floor(r%60);
    document.getElementById('pomo-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    const prog=1-pomoState.remaining/pomoState.total,circ=753.98;
    document.getElementById('pomo-arc').style.strokeDashoffset=circ*(1-prog);
    if(pomoState.remaining<=0){onPomoPhaseEnd();return}
    pomoRAF=requestAnimationFrame(frame);
  }
  frame();
}
function onPomoPhaseEnd(){
  playAlertSound();if(navigator.vibrate)navigator.vibrate([100,50,100]);
  const s=pomoState;
  if(s.phase==='work'){
    if(s.round>=POMO_TOTAL){
      // start long break
      s.phase='longBreak';s.total=POMO_LONG;s.remaining=POMO_LONG;s.startedAt=Date.now();s.pauseOffset=0;
      renderPomoUI();tickPomo();
    } else {
      // start breathing break (coherent breathing)
      s.phase='shortBreak';
      renderPomoUI();
      const coherent=techniques.find(t=>t.id==='coherent');
      startSession(coherent,'pomo');
    }
  } else if(s.phase==='shortBreak'){
    // back to work
    s.round++;s.phase='work';s.total=POMO_WORK;s.remaining=POMO_WORK;s.startedAt=Date.now();s.pauseOffset=0;
    renderPomoUI();tickPomo();
  } else if(s.phase==='longBreak'){
    finishPomo();
  }
}
function advancePomo(){
  // called when breathing session finishes during pomo break
  const s=pomoState;if(!s)return;
  document.getElementById('pomo').classList.add('active');
  s.round++;s.phase='work';s.total=POMO_WORK;s.remaining=POMO_WORK;s.startedAt=Date.now();s.pauseOffset=0;
  renderPomoUI();tickPomo();
}
function finishPomo(){
  cancelAnimationFrame(pomoRAF);pomoState=null;
  document.getElementById('pomo').classList.remove('active');
  const d=document.getElementById('done');d.classList.add('active');d.style.color='var(--tomato)';
  document.getElementById('done-title').textContent=zh?'太棒了！':'Great Job!';
  document.getElementById('done-sub').textContent=zh?`完成 ${POMO_TOTAL} 個蕃茄 + ${POMO_TOTAL-1} 次呼吸練習`:`${POMO_TOTAL} pomodoros + ${POMO_TOTAL-1} breathing sessions`;
  document.getElementById('done-btn').textContent=zh?'結束':'Done';document.getElementById('done-btn').style.background='rgba(232,99,74,.2)';
}
function togglePomoPause(){
  if(!pomoState)return;
  if(pomoPaused){pomoState.startedAt=Date.now();pomoState.remaining=pomoState.remaining;pomoState.total=pomoState.remaining;pomoState.pauseOffset=0;pomoPaused=false;tickPomo()}
  else{pomoPaused=true}
  renderPomoUI();
}
function exitPomo(){cancelAnimationFrame(pomoRAF);pomoState=null;pomoPaused=false;document.getElementById('pomo').classList.remove('active');document.getElementById('home').style.display='flex'}

// ===================== REMINDERS =====================
function showReminder(){
  const m=document.getElementById('reminder-modal');m.classList.add('active');renderReminder();
}
function renderReminder(){
  let html=`<div class="reminder-title">${zh?'呼吸提醒':'Breathing Reminders'}</div><div class="reminder-list">`;
  reminders.forEach((r,i)=>{
    html+=`<div class="reminder-item"><input type="time" value="${r.time}" onchange="updateReminder(${i},this.value)"><span style="font-size:12px;color:var(--text2)">${zh?'每日':'Daily'}</span><button class="reminder-del" onclick="deleteReminder(${i})">\u{2715}</button></div>`;
  });
  html+=`</div>`;
  if(reminders.length<3) html+=`<button class="reminder-add" onclick="addReminder()">+ ${zh?'新增提醒':'Add Reminder'}</button>`;
  html+=`<button class="reminder-save" onclick="saveReminders()">${zh?'儲存':'Save'}</button>`;
  html+=`<div class="reminder-note">${zh?'提醒功能需要保持此頁面開啟':'Reminders require this page to stay open'}</div>`;
  document.getElementById('reminder-sheet').innerHTML=html;
}
function addReminder(){reminders.push({time:'09:00',daily:true});renderReminder()}
function deleteReminder(i){reminders.splice(i,1);renderReminder()}
function updateReminder(i,v){reminders[i].time=v}
function saveReminders(){
  localStorage.setItem('reminders',JSON.stringify(reminders));
  if(reminders.length>0&&'Notification' in window&&Notification.permission==='default'){Notification.requestPermission()}
  document.getElementById('reminder-modal').classList.remove('active');renderHome();
}
function closeReminder(e){if(e.target.id==='reminder-modal')document.getElementById('reminder-modal').classList.remove('active')}
// Check reminders every 30s
let lastNotified={};
setInterval(()=>{
  if(!reminders.length)return;
  const now=new Date(),hm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  reminders.forEach(r=>{
    if(r.time===hm&&lastNotified[r.time]!==now.getMinutes()){
      lastNotified[r.time]=now.getMinutes();
      if('Notification' in window&&Notification.permission==='granted'){
        new Notification(zh?'BreathFlow 呼吸提醒':'BreathFlow Reminder',{body:zh?'是時候放鬆一下了 — 開始呼吸練習':'Time to relax — start a breathing exercise',icon:'\u{1F30A}'});
      }
      playAlertSound();
    }
  });
},30000);

// ===================== INFO =====================
function showInfo(){
  if(!cur)return;const i=cur.info,l=zh;
  let html=`<div class="info-handle"></div><div class="info-header"><span style="font-size:28px;color:${cur.colorRaw}">${cur.icon}</span><h2>${l?cur.nameZH:cur.nameEN}</h2><button class="info-close" onclick="closeInfo(event)">\u{2715}</button></div>
    <div class="info-section"><h3 style="color:${cur.colorRaw}">${l?'簡介':'About'}</h3><p>${l?i.descZH:i.descEN}</p></div>
    <div class="info-section"><h3 style="color:${cur.colorRaw}">${l?'科學驗證':'Science'}</h3><p>${l?i.sciZH:i.sciEN}</p></div>
    <div class="info-section"><h3 style="color:${cur.colorRaw}">${l?'研究來源':'Source'}</h3><p>${l?i.srcZH:i.srcEN}</p></div>`;
  const w=l?i.warnZH:i.warnEN;if(w)html+=`<div class="info-warning"><h3>\u{26A0} ${l?'注意事項':'Caution'}</h3><p>${w}</p></div>`;
  html+=`<div class="info-section"><h3 style="color:${cur.colorRaw}">${l?'節奏':'Rhythm'}</h3><div class="rhythm-tags">`;
  cur.steps.forEach(s=>{html+=`<span class="rhythm-tag">${phaseNames[s.p][l?'zh':'en']} ${s.d}s</span>`});
  html+=`</div></div>`;
  document.getElementById('info-sheet').innerHTML=html;document.getElementById('info-modal').classList.add('active');
}
function closeInfo(e){if(e.target.id==='info-modal'||e.target.classList.contains('info-close'))document.getElementById('info-modal').classList.remove('active')}

// ===================== INIT =====================
renderHome();
if('Notification' in window&&Notification.permission==='default'&&reminders.length>0)Notification.requestPermission();
</script>
