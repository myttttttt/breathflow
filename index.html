<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121219">
<title>BreathFlow</title>
<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121219;--card:#21212b;
  --text:rgba(255,255,255,.9);--text2:rgba(255,255,255,.5);
  --card-shadow:none;
  --coral:#f28d73;--blue:#6699cc;--indigo:#7366bf;--sage:#8cbf8c;--tomato:#e8634a;
  --teal:#5cad9e;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Rounded','Helvetica Neue',sans-serif;
}
html[data-theme="light"]{
  --bg:#f0ede6;--card:rgba(255,255,255,.75);
  --text:#2c2c2e;--text2:#8e8e93;
  --card-shadow:0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --coral:#d4654e;--blue:#4a7faa;--indigo:#5b52a0;--sage:#5a9a6a;--tomato:#c94e38;
  --teal:#3d8f82;
}
html[data-theme="light"] body{background:linear-gradient(175deg,#f0ede6 0%,#e8e4db 50%,#dfd9ce 100%)}
html[data-theme="light"] .home-title{color:#3a3a3c;letter-spacing:3px}
html[data-theme="light"] .card{background:rgba(255,255,255,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.5)}
html[data-theme="light"] .card-name{color:#1c1c1e}
html[data-theme="light"] .section-label{color:#8e8e93;font-weight:600}
html[data-theme="light"] .top-btn,html[data-theme="light"] .lang-btn,html[data-theme="light"] .theme-btn,html[data-theme="light"] .login-btn{background:rgba(255,255,255,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.5)}
html[data-theme="light"] .user-dropdown{background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
html[data-theme="light"] .reminder-sheet{background:#f0ede6}
html[data-theme="light"] .reminder-item{background:rgba(255,255,255,.6)}
html[data-theme="light"] .reminder-save{background:#5a9a6a;color:#fff}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* HOME */
#home{display:flex;flex-direction:column;height:100%;padding:env(safe-area-inset-top) 24px 0}
.top-bar{display:flex;justify-content:flex-end;gap:8px;padding:16px 0 0;align-items:center}
.top-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--card-shadow)}
.lang-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;box-shadow:var(--card-shadow)}
.theme-btn{width:36px;height:36px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--card-shadow)}
/* Login button */
.login-btn{height:36px;border-radius:18px;background:var(--card);border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;padding:0 14px;display:flex;align-items:center;gap:6px;box-shadow:var(--card-shadow)}
.login-btn:active{transform:scale(.95)}
.avatar-btn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;padding:0;background:none;position:relative}
.avatar-btn img{width:36px;height:36px;border-radius:50%;object-fit:cover;display:block}
/* User dropdown */
.user-dropdown{position:absolute;top:44px;right:0;background:var(--card);border-radius:14px;padding:16px;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:30;display:none}
.user-dropdown.active{display:block}
.user-dropdown-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-dropdown-email{font-size:11px;color:var(--text2);margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{width:100%;padding:10px;background:rgba(255,255,255,.08);border:none;border-radius:10px;color:var(--coral);font-size:13px;font-weight:500;cursor:pointer}
html[data-theme="light"] .logout-btn{background:rgba(0,0,0,.05)}
.logout-btn:active{transform:scale(.97)}

/* Reminder FAB */
.reminder-fab{position:fixed;bottom:32px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.4);transition:transform .15s}
html[data-theme="light"] .reminder-fab{border-color:rgba(0,0,0,.08);box-shadow:0 2px 12px rgba(0,0,0,.12)}
.reminder-fab:active{transform:scale(.9)}
.reminder-fab .badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--sage);color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.home-title{text-align:center;font-size:34px;font-weight:200;margin:8px 0 20px;letter-spacing:2px}
.cards{display:flex;flex-direction:column;gap:14px;overflow-y:auto;flex:1;padding-bottom:40px}
.section-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.card{display:flex;align-items:center;gap:16px;padding:16px;background:var(--card);border-radius:16px;cursor:pointer;transition:transform .15s;box-shadow:var(--card-shadow)}
.card:active{transform:scale(.97)}
.card-icon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:24px}
.card-body{flex:1}
.card-row{display:flex;justify-content:space-between;align-items:center}
.card-name{font-size:20px;font-weight:600}
.card-time{font-size:12px;color:var(--text2)}
.card-sub{font-size:13px;margin-top:3px}
.card-purpose{font-size:12px;color:var(--text2);margin-top:2px}

/* Stats card */
.stats-card{padding:20px;background:var(--card);border-radius:16px;text-align:center;margin-top:4px;box-shadow:var(--card-shadow)}
.stats-streak{font-size:40px;font-weight:700;margin-bottom:4px}
.stats-streak-label{font-size:14px;color:var(--text2);margin-bottom:14px}
.stats-row{display:flex;justify-content:center;gap:24px}
.stats-item{text-align:center}
.stats-item-value{font-size:18px;font-weight:600}
.stats-item-label{font-size:11px;color:var(--text2);margin-top:2px}

/* SESSION (breathing) - always dark */
#session{position:fixed;inset:0;background:#121219;display:none;flex-direction:column;z-index:10;color:rgba(255,255,255,.9)}
#session.active{display:flex}
.sess-top{display:flex;justify-content:space-between;align-items:center;padding:60px 24px 0}
.sess-btn{background:none;border:none;color:rgba(255,255,255,.9);font-size:20px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
.sess-right{display:flex;align-items:center;gap:8px}
.sess-counter{font-size:14px;font-family:monospace;color:rgba(255,255,255,.9)}

/* Background sound icon button (session top bar) */
.bg-sound-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.85);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.bg-sound-btn.muted{opacity:.35}

.sess-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.phase-label{font-size:30px;font-weight:300;margin-bottom:48px;transition:opacity .3s;color:rgba(255,255,255,.9)}
.breath-area{position:relative;width:340px;height:340px;display:flex;align-items:center;justify-content:center}
.breath-circle{width:220px;height:220px;border-radius:50%;position:absolute;transition:transform ease-in-out;will-change:transform}
.breath-glow{width:260px;height:260px;border-radius:50%;position:absolute;filter:blur(20px);opacity:.08;transition:transform ease-in-out;will-change:transform}
.timer-arc{position:absolute;width:270px;height:270px}
.timer-arc circle{fill:none;stroke-width:2;stroke-linecap:round;transition:stroke-dashoffset linear .05s}
.hypno-ring{position:absolute;border-radius:50%;border-style:dashed;opacity:0;transition:opacity .5s}
.hypno-ring.visible{opacity:1}
.ring1{width:330px;height:330px;border-width:1.2px;animation:spin1 50s linear infinite}
.ring2{width:290px;height:290px;border-width:1px;animation:spin2 38s linear infinite}
.ring3{width:250px;height:250px;border-width:.8px;animation:spin3 28s linear infinite}
.ring4{width:216px;height:216px;border-width:.7px;animation:spin4 21s linear infinite}
.ring5{width:184px;height:184px;border-width:.6px;animation:spin5 15s linear infinite}
@keyframes spin1{to{transform:rotate(360deg)}}
@keyframes spin2{to{transform:rotate(-360deg)}}
@keyframes spin3{to{transform:rotate(360deg)}}
@keyframes spin4{to{transform:rotate(-360deg)}}
@keyframes spin5{to{transform:rotate(360deg)}}
.sess-footer{text-align:center;padding-bottom:40px}
.instruction{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:4px;transition:opacity .3s}
.sleep-hint{font-size:12px;color:rgba(255,255,255,.35);margin-bottom:16px}
.info-btn{background:none;border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;padding:8px}

/* DONE - always dark */
#done{position:fixed;inset:0;background:#121219;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:11;color:rgba(255,255,255,.9)}
#done.active{display:flex}
.done-icon{font-size:60px;margin-bottom:16px}
.done-title{font-size:28px;font-weight:300;margin-bottom:8px}
.done-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:8px}
.done-streak{font-size:22px;font-weight:600;margin-bottom:4px}
.done-streak-text{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:40px}
.done-btn{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.9);font-size:20px;font-weight:600;padding:16px 0;width:calc(100% - 80px);border-radius:14px;cursor:pointer}

/* INFO MODAL */
#info-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20;align-items:flex-end;justify-content:center}
#info-modal.active{display:flex}
.info-sheet{background:#121219;border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:24px 24px env(safe-area-inset-bottom);color:rgba(255,255,255,.9)}
.info-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 20px}
.info-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.info-header span{font-size:28px}
.info-header h2{font-size:24px;font-weight:300;flex:1}
.info-close{background:none;border:none;color:rgba(255,255,255,.5);font-size:22px;cursor:pointer}
.info-section{margin-bottom:20px}
.info-section h3{font-size:15px;font-weight:600;margin-bottom:8px}
.info-section p{font-size:16px;line-height:1.6;color:rgba(255,255,255,.85)}
.info-warning{background:rgba(255,200,0,.08);padding:16px;border-radius:12px;margin-bottom:20px}
.info-warning h3{color:rgba(255,200,0,.8)}
.info-warning p{color:rgba(255,255,255,.8)}
.rhythm-tags{display:flex;gap:8px;flex-wrap:wrap}
.rhythm-tag{background:#21212b;padding:6px 10px;border-radius:8px;font-size:13px;color:rgba(255,255,255,.7)}

/* REMINDER MODAL */
#reminder-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:20;align-items:center;justify-content:center}
#reminder-modal.active{display:flex}
.reminder-sheet{background:var(--bg);border-radius:20px;width:calc(100% - 48px);max-width:360px;padding:24px}
.reminder-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center}
.reminder-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.reminder-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);border-radius:12px}
.reminder-item input[type=time]{background:transparent;border:none;color:var(--text);font-size:18px;font-family:monospace;flex:1;outline:none}
html[data-theme="light"] .reminder-item input[type=time]::-webkit-calendar-picker-indicator{filter:none}
html:not([data-theme="light"]) .reminder-item input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1)}
.reminder-del{background:none;border:none;color:var(--coral);font-size:18px;cursor:pointer}
.reminder-add{width:100%;padding:12px;background:var(--card);border:1px dashed rgba(255,255,255,.2);border-radius:12px;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:16px}
html[data-theme="light"] .reminder-add{border-color:rgba(0,0,0,.15)}
.reminder-save{width:100%;padding:14px;background:var(--sage);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:600;cursor:pointer}
.reminder-note{font-size:11px;color:var(--text2);text-align:center;margin-top:12px}

/* POMODORO - always dark */
#pomo{position:fixed;inset:0;background:#121219;display:none;flex-direction:column;z-index:10;color:rgba(255,255,255,.9)}
#pomo.active{display:flex}
.pomo-top{display:flex;justify-content:space-between;align-items:center;padding:60px 24px 0}
.pomo-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pomo-status{font-size:16px;color:rgba(255,255,255,.5);margin-bottom:8px}
.pomo-ring{position:relative;width:260px;height:260px;margin-bottom:32px}
.pomo-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring circle.bg{fill:none;stroke:#21212b;stroke-width:6}
.pomo-ring circle.fg{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s linear}
.pomo-time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:200;font-family:monospace;color:rgba(255,255,255,.9)}
.pomo-dots{display:flex;gap:12px;margin-bottom:24px}
.pomo-dot{width:12px;height:12px;border-radius:50%;background:#21212b;transition:background .3s}
.pomo-dot.done{background:var(--tomato)}
.pomo-dot.active{background:var(--tomato);box-shadow:0 0 8px var(--tomato)}
.pomo-label{font-size:14px;color:rgba(255,255,255,.5)}
.pomo-footer{text-align:center;padding-bottom:40px}
.pomo-pause{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);padding:10px 32px;border-radius:10px;font-size:15px;cursor:pointer}

/* CUSTOM BREATHE MODAL */
#custom-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:20;align-items:center;justify-content:center}
#custom-modal.active{display:flex}
.custom-sheet{background:var(--bg);border-radius:20px;width:calc(100% - 48px);max-width:380px;padding:24px;max-height:90vh;overflow-y:auto}
.custom-title{font-size:20px;font-weight:600;margin-bottom:20px;text-align:center}
.custom-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(128,128,128,.12)}
.custom-row-label{font-size:14px;color:var(--text)}
.custom-row-control{display:flex;align-items:center;gap:10px}
.custom-adj{width:32px;height:32px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--card-shadow)}
.custom-adj:active{transform:scale(.9)}
.custom-val{font-size:18px;font-weight:600;min-width:32px;text-align:center;font-family:monospace}
.custom-preview{margin:20px 0 16px;text-align:center}
.custom-preview-bar{display:flex;height:24px;border-radius:12px;overflow:hidden;margin-bottom:6px}
.custom-preview-seg{display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.8);font-weight:500}
.custom-preview-total{font-size:12px;color:var(--text2)}
.custom-start{width:100%;padding:14px;background:var(--teal);border:none;border-radius:12px;color:#000;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.custom-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}

/* SOUND PICKER BOTTOM SHEET */
#sound-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;z-index:25;align-items:flex-end;justify-content:center}
#sound-modal.active{display:flex}
.sound-sheet{background:#121219;border-radius:20px 20px 0 0;width:100%;padding:20px 24px env(safe-area-inset-bottom);max-height:50vh;color:rgba(255,255,255,.9)}
.sound-sheet .info-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 16px}
.sound-sheet-title{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.sound-option{display:flex;align-items:center;gap:14px;padding:14px;background:#21212b;border-radius:12px;cursor:pointer;margin-bottom:8px;border:2px solid transparent;transition:border-color .2s}
.sound-option.selected{border-color:var(--teal)}
.sound-option-icon{font-size:22px;width:36px;text-align:center}
.sound-option-name{font-size:15px;font-weight:500;flex:1}
.sound-option-check{font-size:18px;color:var(--teal);opacity:0;transition:opacity .2s}
.sound-option.selected .sound-option-check{opacity:1}
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <div class="top-bar">
    <div id="auth-area"></div>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()"></button>
    <button class="lang-btn" onclick="toggleLang()">EN</button>
  </div>
  <h1 class="home-title">&#x547C;&#x5438;&#x6CD5;</h1>
  <div class="cards" id="cards"></div>
  <button class="reminder-fab" onclick="showReminder()" id="reminder-fab">&#x1F514;</button>
</div>

<!-- SESSION -->
<div id="session">
  <div class="sess-top">
    <button class="sess-btn" onclick="exitSession()">&#x2715;</button>
    <div class="sess-right">
      <button class="bg-sound-btn" id="bg-sound-btn" onclick="showSoundPicker()" title="Background sound">&#x266A;</button>
      <span class="sess-counter" id="counter"></span>
    </div>
  </div>
  <div class="sess-body">
    <div class="phase-label" id="phase-label"></div>
    <div class="breath-area">
      <div class="hypno-ring ring1" id="hr1"></div>
      <div class="hypno-ring ring2" id="hr2"></div>
      <div class="hypno-ring ring3" id="hr3"></div>
      <div class="hypno-ring ring4" id="hr4"></div>
      <div class="hypno-ring ring5" id="hr5"></div>
      <div class="breath-glow" id="glow"></div>
      <div class="breath-circle" id="circle"></div>
      <svg class="timer-arc" viewBox="0 0 270 270">
        <circle id="arc" cx="135" cy="135" r="133" transform="rotate(-90 135 135)" stroke-dasharray="835.66" stroke-dashoffset="835.66"/>
      </svg>
    </div>
  </div>
  <div class="sess-footer">
    <div class="instruction" id="instruction"></div>
    <div class="sleep-hint" id="sleep-hint" style="display:none"></div>
    <button class="info-btn" id="info-btn" onclick="showInfo()"></button>
  </div>
</div>

<!-- POMODORO -->
<div id="pomo">
  <div class="pomo-top">
    <button class="sess-btn" onclick="exitPomo()">&#x2715;</button>
    <div class="sess-right">
      <button class="bg-sound-btn" id="pomo-bg-sound-btn" onclick="showSoundPicker()" title="Background sound">&#x266A;</button>
    </div>
  </div>
  <div class="pomo-body">
    <div class="pomo-status" id="pomo-status"></div>
    <div class="pomo-ring">
      <svg viewBox="0 0 260 260">
        <circle class="bg" cx="130" cy="130" r="120"/>
        <circle class="fg" id="pomo-arc" cx="130" cy="130" r="120" stroke-dasharray="753.98" stroke-dashoffset="0"/>
      </svg>
      <div class="pomo-time" id="pomo-time">25:00</div>
    </div>
    <div class="pomo-dots" id="pomo-dots"></div>
    <div class="pomo-label" id="pomo-label"></div>
  </div>
  <div class="pomo-footer">
    <button class="pomo-pause" id="pomo-pause" onclick="togglePomoPause()"></button>
  </div>
</div>

<!-- DONE -->
<div id="done">
  <div class="done-icon">&#x2714;</div>
  <div class="done-title" id="done-title"></div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-streak" id="done-streak"></div>
  <div class="done-streak-text" id="done-streak-text"></div>
  <button class="done-btn" id="done-btn" onclick="closeDone()"></button>
</div>

<!-- INFO MODAL -->
<div id="info-modal" onclick="closeInfo(event)">
  <div class="info-sheet" id="info-sheet"></div>
</div>

// Phase transition sounds (singing bowl) - ALWAYS play, not toggleable
function playPhaseSound(phase) {
  if (!audioCtx) return;
  var freqs = {inhale:[261.6,392,523.2], inhale2:[329.6,392], hold:[196,293.6], holdAfter:[196,293.6], exhale:[130.8,196,329.6], rest:[]};
  var vols = {inhale:.07, inhale2:.05, hold:.025, holdAfter:.025, exhale:.06, rest:0};
  var durs = {inhale:1.2, inhale2:.6, hold:1.2, holdAfter:1.2, exhale:1.2, rest:0};
  var f = freqs[phase] || [];
  if (!f.length) return;
  var dur = durs[phase], vol = vols[phase], t = audioCtx.currentTime;
  f.forEach(function(freq, idx) {
    var osc = audioCtx.createOscillator();
    var g = audioCtx.createGain();
    osc.frequency.value = freq * (1 + idx * .001);
    osc.type = 'sine';
    var amp = vol * (idx === 0 ? 1 : idx === 1 ? .6 : .3);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(amp, t + .03);
    g.gain.exponentialRampToValueAtTime(.0001, t + dur);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + dur);
  });
}

  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  [523.2, 659.2, 784].forEach(function(f, i) {

    o.frequency.value = f;

    g.gain.linearRampToValueAtTime(.08, t + i * .15 + .05);
    g.gain.exponentialRampToValueAtTime(.0001, t + i * .15 + .6);
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start(t + i * .15);
    o.stop(t + i * .15 + .6);
  });
}

    var proc = audioCtx.createScriptProcessor(bufferSize, 0, 1);
    var lp1 = 0, lp2 = 0, dripTimer = 0;
    proc.onaudioprocess = function(e) {
      var out = e.outputBuffer.getChannelData(0);
      for (var i = 0; i < out.length; i++) {
        var n = Math.random() * 2 - 1;
        lp1 += 0.04 * (n - lp1);
        lp2 += 0.04 * (lp1 - lp2);
        var sample = lp2 * 0.15;
        dripTimer--;
        if (dripTimer <= 0) {
          dripTimer = Math.floor(Math.random() * 2000) + 200;
          sample += (Math.random() * 2 - 1) * 0.3;
        }
        if (dripTimer < 10) {
          sample += (Math.random() * 2 - 1) * 0.08 * (dripTimer / 10);
        }
        out[i] = sample;
      }
    };
    proc.connect(masterGain);
    bgSoundNodes = {processor: proc, gain: masterGain};

  } else if (soundId === 'ocean') {
    var proc = audioCtx.createScriptProcessor(bufferSize, 0, 1);
    var olp1 = 0, olp2 = 0;
    proc.onaudioprocess = function(e) {
      var out = e.outputBuffer.getChannelData(0);
      for (var i = 0; i < out.length; i++) {
        var n = Math.random() * 2 - 1;
        olp1 += 0.03 * (n - olp1);
        olp2 += 0.03 * (olp1 - olp2);
        var t = audioCtx.currentTime + i / audioCtx.sampleRate;
        var wave1 = (1 + Math.sin(2 * Math.PI * 0.08 * t)) * 0.5;
        var wave2 = (1 + Math.sin(2 * Math.PI * 0.05 * t + 1.5)) * 0.5;
        var mod = 0.3 + 0.7 * wave1 * wave2;
        out[i] = olp2 * 0.2 * mod;
      }
    };
    proc.connect(masterGain);
    bgSoundNodes = {processor: proc, gain: masterGain};

  } else if (soundId === 'stream') {
    var proc = audioCtx.createScriptProcessor(bufferSize, 0, 1);
    var slp1 = 0, slp2 = 0;
    proc.onaudioprocess = function(e) {
      var out = e.outputBuffer.getChannelData(0);
      for (var i = 0; i < out.length; i++) {
        var n = Math.random() * 2 - 1;
        slp1 += 0.06 * (n - slp1);
        slp2 += 0.06 * (slp1 - slp2);
        var t = audioCtx.currentTime + i / audioCtx.sampleRate;
        var f1 = (1 + Math.sin(2 * Math.PI * 0.12 * t)) * 0.5;
        var f2 = (1 + Math.sin(2 * Math.PI * 0.07 * t + 2.1)) * 0.5;
        out[i] = slp2 * 0.12 * (0.6 + 0.4 * f1 * f2);
      }
    };
    proc.connect(masterGain);
    bgSoundNodes = {processor: proc, gain: masterGain};

  } else if (soundId === 'whitenoise') {
    var proc = audioCtx.createScriptProcessor(bufferSize, 0, 1);
    proc.onaudioprocess = function(e) {
      var out = e.outputBuffer.getChannelData(0);
      for (var i = 0; i < out.length; i++) {
        out[i] = (Math.random() * 2 - 1) * 0.06;
      }
    };
    proc.connect(masterGain);
    bgSoundNodes = {processor: proc, gain: masterGain};
  }
}

// ===================== BREATHING SESSION =====================
function startSession(t, from) {
  initAudio();
  if (selectedSound !== 'silent') startBgSound(selectedSound);
  updateSoundButtons();

  cur = t;
  stepIdx = 0;
  cycle = 1;
  pomoFrom = from || 'home';
  sessionStartTime = Date.now();
  document.getElementById('session').classList.add('active');
  document.getElementById('home').style.display = 'none';
  document.getElementById('pomo').classList.remove('active');
  var circle = document.getElementById('circle'), glow = document.getElementById('glow');
  circle.style.background = 'radial-gradient(circle,' + t.colorRaw + '99,' + t.colorRaw + '26)';
  glow.style.background = t.colorRaw;
  document.getElementById('arc').style.stroke = t.colorRaw + '59';
  document.querySelectorAll('.hypno-ring').forEach(function(r) {
    r.style.borderColor = t.colorRaw;
    r.classList.toggle('visible', t.hypnotic);
  });
  var hint = document.getElementById('sleep-hint');
  if (t.id === '4-7-8') {
    hint.style.display = 'block';
    hint.textContent = zh ? '\u770B\u8457\u5716\u50CF\u8B8A\u5316\u6703\u66F4\u5BB9\u6613\u6709\u7761\u610F' : 'Watching the visual changes helps you feel sleepy';
  } else {
    hint.style.display = 'none';
  }
  document.getElementById('info-btn').textContent = zh ? '(i) \u4E86\u89E3\u66F4\u591A' : '(i) Learn More';
  runStep();
}

function runStep() {
  if (!cur) return;
  var step = cur.steps[stepIdx], p = step.p, d = step.d;
  phaseDur = d;
  phaseStart = performance.now();
  var l = zh ? 'zh' : 'en';
  document.getElementById('phase-label').textContent = phaseNames[p][l];
  document.getElementById('instruction').textContent = phaseInstr[p][l];
  document.getElementById('counter').textContent = cycle + ' / ' + cur.cycles;
  var sc = scaleMap[p], circle = document.getElementById('circle'), glow = document.getElementById('glow');
  var ease = (p === 'inhale' || p === 'inhale2') ? 'ease-in' : p === 'exhale' ? 'ease-out' : 'ease-in-out';
  var dur = (p === 'hold' || p === 'holdAfter') ? .3 : d;
  circle.style.transition = 'transform ' + dur + 's ' + ease;
  glow.style.transition = 'transform ' + dur + 's ' + ease;
  circle.style.transform = 'scale(' + sc + ')';
  glow.style.transform = 'scale(' + sc + ')';
  // Phase sounds ALWAYS play
  playPhaseSound(p);
  if (navigator.vibrate) navigator.vibrate(p === 'exhale' ? 40 : (p === 'hold' || p === 'holdAfter') ? 15 : 25);
  startArc();
  clearTimeout(timer);
  timer = setTimeout(function() {
    stepIdx++;
    if (stepIdx >= cur.steps.length) {
      stepIdx = 0;
      cycle++;
      if (cycle > cur.cycles) { finishSession(); return; }
    }
    runStep();
  }, d * 1000);
}

function startArc() {
  var arc = document.getElementById('arc'), total = 835.66;
  function tick() {
    var p = Math.min((performance.now() - phaseStart) / 1000 / phaseDur, 1);
    arc.style.strokeDashoffset = total * (1 - p);
    if (p < 1) arcRAF = requestAnimationFrame(tick);
  }
  cancelAnimationFrame(arcRAF);
  tick();
}

function finishSession() {
  clearTimeout(timer);
  cancelAnimationFrame(arcRAF);
  stopBgSound();
  document.getElementById('session').classList.remove('active');

  // Calculate duration
  var durationSec = sessionStartTime ? Math.round((Date.now() - sessionStartTime) / 1000) : 0;
  var techniqueName = cur ? (zh ? cur.nameZH : cur.nameEN) : 'Unknown';

  if (pomoFrom === 'pomo') {
    // Save to Firestore even for pomo breathing breaks
    if (currentUser) {
      saveSessionToFirestore(techniqueName, durationSec);
    }
    cur = null;
    advancePomo();
    return;
  }

  // Save to Firestore
  if (currentUser) {
    saveSessionToFirestore(techniqueName, durationSec);
  }

  var d = document.getElementById('done');
  d.classList.add('active');
  d.style.color = cur.colorRaw;
  document.getElementById('done-title').textContent = zh ? '\u5B8C\u6210\u4E86' : 'Well Done';
  document.getElementById('done-sub').textContent = zh ? cur.nameZH : cur.nameEN;

  // Show streak on done screen if logged in
  var doneStreak = document.getElementById('done-streak');
  var doneStreakText = document.getElementById('done-streak-text');
  if (currentUser && userStats) {
    var streak = userStats.currentStreak || 1;
    doneStreak.textContent = '\uD83D\uDD25 ' + (zh ? '\u9023\u7E8C ' + streak + ' \u5929' : streak + ' day streak');
    doneStreak.style.display = 'block';
    doneStreakText.textContent = zh ? '\u7E7C\u7E8C\u4FDD\u6301\uFF0C\u4F60\u505A\u5F97\u5F88\u68D2\uFF01' : 'Keep going, you are doing great!';
    doneStreakText.style.display = 'block';
  } else {
    doneStreak.style.display = 'none';
    doneStreakText.style.display = 'none';
  }

  document.getElementById('done-btn').textContent = zh ? '\u7D50\u675F' : 'Done';
  document.getElementById('done-btn').style.background = cur.colorRaw + '33';
}

function closeDone() {
  document.getElementById('done').classList.remove('active');
  document.getElementById('home').style.display = 'flex';
  cur = null;
}

function exitSession() {
  clearTimeout(timer);
  cancelAnimationFrame(arcRAF);
  stopBgSound();
  document.getElementById('session').classList.remove('active');
  if (pomoFrom === 'pomo') {
    document.getElementById('pomo').classList.add('active');
    cur = null;
    return;
  }
  document.getElementById('home').style.display = 'flex';
  cur = null;
}

// ===================== POMODORO =====================
var POMO_WORK = 25 * 60, POMO_SHORT = 5 * 60, POMO_LONG = 15 * 60, POMO_TOTAL = 4;

function startPomo() {
  initAudio();
  pomoState = {phase: 'work', round: 1, remaining: POMO_WORK, total: POMO_WORK, startedAt: Date.now(), pauseOffset: 0};
  pomoPaused = false;
  document.getElementById('home').style.display = 'none';
  document.getElementById('pomo').classList.add('active');
  document.getElementById('pomo-arc').style.stroke = 'var(--tomato)';
  updateSoundButtons();
  renderPomoUI();
  tickPomo();
}

function renderPomoUI() {
  var s = pomoState;
  if (!s) return;
  var statusMap = {work: {zh: '\u5C08\u6CE8\u5DE5\u4F5C\u4E2D', en: 'Focus Time'}, shortBreak: {zh: '\u547C\u5438\u4F11\u606F', en: 'Breathing Break'}, longBreak: {zh: '\u9577\u4F11\u606F', en: 'Long Break'}};
  document.getElementById('pomo-status').textContent = statusMap[s.phase][zh ? 'zh' : 'en'];
  var dots = '';
  for (var i = 1; i <= POMO_TOTAL; i++) {
    var cls = i < s.round ? 'done' : i === s.round ? 'active' : '';
    dots += '<div class="pomo-dot ' + cls + '"></div>';
  }
  document.getElementById('pomo-dots').innerHTML = dots;
  document.getElementById('pomo-label').textContent = zh ? '\u7B2C ' + s.round + ' / ' + POMO_TOTAL + ' \u500B\u856A\u8304' : 'Pomodoro ' + s.round + ' / ' + POMO_TOTAL;
  document.getElementById('pomo-pause').textContent = pomoPaused ? (zh ? '\u7E7C\u7E8C' : 'Resume') : (zh ? '\u66AB\u505C' : 'Pause');
  document.getElementById('pomo-arc').style.stroke = s.phase === 'work' ? 'var(--tomato)' : 'var(--sage)';
}

function tickPomo() {
  cancelAnimationFrame(pomoRAF);
  function frame() {
    if (!pomoState) return;
    if (!pomoPaused) {
      var elapsed = (Date.now() - pomoState.startedAt - pomoState.pauseOffset) / 1000;
      pomoState.remaining = Math.max(0, pomoState.total - elapsed);
    }
    var r = pomoState.remaining, m = Math.floor(r / 60), s = Math.floor(r % 60);
    document.getElementById('pomo-time').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    var prog = 1 - pomoState.remaining / pomoState.total, circ = 753.98;
    document.getElementById('pomo-arc').style.strokeDashoffset = circ * (1 - prog);
    if (pomoState.remaining <= 0) { onPomoPhaseEnd(); return; }
    pomoRAF = requestAnimationFrame(frame);
  }
  frame();
}

function onPomoPhaseEnd() {
  playAlertSound();
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  var s = pomoState;
  if (s.phase === 'work') {
    if (s.round >= POMO_TOTAL) {
      s.phase = 'longBreak';
      s.total = POMO_LONG;
      s.remaining = POMO_LONG;
      s.startedAt = Date.now();
      s.pauseOffset = 0;
      renderPomoUI();
      tickPomo();
    } else {
      s.phase = 'shortBreak';
      renderPomoUI();
      var coherent = techniques.find(function(t) { return t.id === 'coherent'; });
      startSession(coherent, 'pomo');
    }
  } else if (s.phase === 'shortBreak') {
    s.round++;
    s.phase = 'work';
    s.total = POMO_WORK;
    s.remaining = POMO_WORK;
    s.startedAt = Date.now();
    s.pauseOffset = 0;
    renderPomoUI();
    tickPomo();
  } else if (s.phase === 'longBreak') {
    finishPomo();
  }
}

function advancePomo() {
  var s = pomoState;
  if (!s) return;
  document.getElementById('pomo').classList.add('active');
  s.round++;
  s.phase = 'work';
  s.total = POMO_WORK;
  s.remaining = POMO_WORK;
  s.startedAt = Date.now();
  s.pauseOffset = 0;
  renderPomoUI();
  tickPomo();
}

function finishPomo() {
  cancelAnimationFrame(pomoRAF);
  pomoState = null;
  document.getElementById('pomo').classList.remove('active');
  var d = document.getElementById('done');
  d.classList.add('active');
  d.style.color = 'var(--tomato)';
  document.getElementById('done-title').textContent = zh ? '\u592A\u68D2\u4E86\uFF01' : 'Great Job!';
  document.getElementById('done-sub').textContent = zh ? '\u5B8C\u6210 ' + POMO_TOTAL + ' \u500B\u856A\u8304 + ' + (POMO_TOTAL - 1) + ' \u6B21\u547C\u5438\u7DF4\u7FD2' : POMO_TOTAL + ' pomodoros + ' + (POMO_TOTAL - 1) + ' breathing sessions';
  document.getElementById('done-btn').textContent = zh ? '\u7D50\u675F' : 'Done';
  document.getElementById('done-btn').style.background = 'rgba(232,99,74,.2)';
  // Hide streak for pomo done
  document.getElementById('done-streak').style.display = 'none';
  document.getElementById('done-streak-text').style.display = 'none';
}

function togglePomoPause() {
  if (!pomoState) return;
  if (pomoPaused) {
    pomoState.startedAt = Date.now();
    pomoState.remaining = pomoState.remaining;
    pomoState.total = pomoState.remaining;
    pomoState.pauseOffset = 0;
    pomoPaused = false;
    tickPomo();
  } else {
    pomoPaused = true;
  }
  renderPomoUI();
}

function exitPomo() {
  cancelAnimationFrame(pomoRAF);
  pomoState = null;
  pomoPaused = false;
  stopBgSound();
  document.getElementById('pomo').classList.remove('active');
  document.getElementById('home').style.display = 'flex';
}

function adjCustom(field, delta) {
  var mins = {inhale: 1, hold: 0, exhale: 1, holdAfter: 0, cycles: 1};
  var maxs = {inhale: 10, hold: 15, exhale: 15, holdAfter: 15, cycles: 30};
  customSettings[field] = Math.max(mins[field], Math.min(maxs[field], customSettings[field] + delta));
  localStorage.setItem('customBreath', JSON.stringify(customSettings));
  renderCustomModal();
}

      descEN: 'Custom breathing pattern: inhale ' + s.inhale + 's' + (s.hold > 0 ? ', hold ' + s.hold + 's' : '') + ', exhale ' + s.exhale + 's' + (s.holdAfter > 0 ? ', hold ' + s.holdAfter + 's' : '') + '.',
      descZH: '\u81EA\u8A02\u547C\u5438\uFF1A\u5438\u6C23 ' + s.inhale + '\u79D2' + (s.hold > 0 ? '\u3001\u618B\u6C23 ' + s.hold + '\u79D2' : '') + '\u3001\u5410\u6C23 ' + s.exhale + '\u79D2' + (s.holdAfter > 0 ? '\u3001\u618B\u6C23 ' + s.holdAfter + '\u79D2' : '') + '\u3002',
      sciEN: 'Personalized breathing pattern tailored to your needs.',
      sciZH: '\u6839\u64DA\u500B\u4EBA\u9700\u6C42\u8A2D\u5B9A\u7684\u547C\u5438\u6A21\u5F0F\u3002',
      srcEN: 'Custom',
      srcZH: '\u81EA\u8A02',
      warnEN: 'Listen to your body. Stop if you feel dizzy.',
      warnZH: '\u8ACB\u50BE\u807D\u8EAB\u9AD4\u3002\u611F\u5230\u982D\u6688\u8ACB\u505C\u6B62\u3002'
    }
  };
  startSession(customTechnique);
}

function closeCustom(e) {
  if (e.target.id === 'custom-modal') {
    document.getElementById('custom-modal').classList.remove('active');
  }
}

// ===================== REMINDERS =====================
function showReminder() {
  var m = document.getElementById('reminder-modal');
  m.classList.add('active');
  renderReminder();
}

function renderReminder() {
  var html = '<div class="reminder-title">' + (zh ? '\u547C\u5438\u63D0\u9192' : 'Breathing Reminders') + '</div><div class="reminder-list">';
  reminders.forEach(function(r, i) {
    html += '<div class="reminder-item"><input type="time" value="' + r.time + '" onchange="updateReminder(' + i + ',this.value)"><span style="font-size:12px;color:var(--text2)">' + (zh ? '\u6BCF\u65E5' : 'Daily') + '</span><button class="reminder-del" onclick="deleteReminder(' + i + ')">\u{2715}</button></div>';
  });
  html += '</div>';
  if (reminders.length < 3) html += '<button class="reminder-add" onclick="addReminder()">+ ' + (zh ? '\u65B0\u589E\u63D0\u9192' : 'Add Reminder') + '</button>';
  html += '<button class="reminder-save" onclick="saveReminders()">' + (zh ? '\u5132\u5B58' : 'Save') + '</button>';
  html += '<div class="reminder-note">' + (zh ? '\u63D0\u9192\u529F\u80FD\u9700\u8981\u4FDD\u6301\u6B64\u9801\u9762\u958B\u555F' : 'Reminders require this page to stay open') + '</div>';
  document.getElementById('reminder-sheet').innerHTML = html;
}

function addReminder() { reminders.push({time: '09:00', daily: true}); renderReminder(); }
function deleteReminder(i) { reminders.splice(i, 1); renderReminder(); }
function updateReminder(i, v) { reminders[i].time = v; }

function saveReminders() {
  localStorage.setItem('reminders', JSON.stringify(reminders));
  if (reminders.length > 0 && 'Notification' in window && Notification.permission === 'default') { Notification.requestPermission(); }
  document.getElementById('reminder-modal').classList.remove('active');
  renderHome();
}

function closeReminder(e) {
  if (e.target.id === 'reminder-modal') document.getElementById('reminder-modal').classList.remove('active');
}

// Check reminders every 30s
var lastNotified = {};
setInterval(function() {
  if (!reminders.length) return;
  var now = new Date(), hm = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  reminders.forEach(function(r) {
    if (r.time === hm && lastNotified[r.time] !== now.getMinutes()) {
      lastNotified[r.time] = now.getMinutes();
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(zh ? 'BreathFlow \u547C\u5438\u63D0\u9192' : 'BreathFlow Reminder', {body: zh ? '\u662F\u6642\u5019\u653E\u9B06\u4E00\u4E0B\u4E86 \u2014 \u958B\u59CB\u547C\u5438\u7DF4\u7FD2' : 'Time to relax \u2014 start a breathing exercise', icon: '\u{1F30A}'});
      }
      playAlertSound();
    }
  });
}, 30000);

// ===================== INFO =====================
function showInfo() {
  if (!cur) return;
  var i = cur.info, l = zh;
  var html = '<div class="info-handle"></div><div class="info-header"><span style="font-size:28px;color:' + cur.colorRaw + '">' + cur.icon + '</span><h2>' + (l ? cur.nameZH : cur.nameEN) + '</h2><button class="info-close" onclick="closeInfo(event)">\u{2715}</button></div>' +
    '<div class="info-section"><h3 style="color:' + cur.colorRaw + '">' + (l ? '\u7C21\u4ECB' : 'About') + '</h3><p>' + (l ? i.descZH : i.descEN) + '</p></div>' +
    '<div class="info-section"><h3 style="color:' + cur.colorRaw + '">' + (l ? '\u79D1\u5B78\u9A57\u8B49' : 'Science') + '</h3><p>' + (l ? i.sciZH : i.sciEN) + '</p></div>' +
    '<div class="info-section"><h3 style="color:' + cur.colorRaw + '">' + (l ? '\u7814\u7A76\u4F86\u6E90' : 'Source') + '</h3><p>' + (l ? i.srcZH : i.srcEN) + '</p></div>';
  var w = l ? i.warnZH : i.warnEN;
  if (w) html += '<div class="info-warning"><h3>\u{26A0} ' + (l ? '\u6CE8\u610F\u4E8B\u9805' : 'Caution') + '</h3><p>' + w + '</p></div>';
  html += '<div class="info-section"><h3 style="color:' + cur.colorRaw + '">' + (l ? '\u7BC0\u594F' : 'Rhythm') + '</h3><div class="rhythm-tags">';
  cur.steps.forEach(function(s) {
    html += '<span class="rhythm-tag">' + phaseNames[s.p][l ? 'zh' : 'en'] + ' ' + s.d + 's</span>';
  });
  html += '</div></div>';
  document.getElementById('info-sheet').innerHTML = html;
  document.getElementById('info-modal').classList.add('active');
}

function closeInfo(e) {
  if (e.target.id === 'info-modal' || e.target.classList.contains('info-close')) document.getElementById('info-modal').classList.remove('active');
}

// ===================== INIT =====================
renderHome();
updateSoundButtons();
if ('Notification' in window && Notification.permission === 'default' && reminders.length > 0) Notification.requestPermission();
</script>
</body>
</html>
